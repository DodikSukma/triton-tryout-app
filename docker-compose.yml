version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: triton-postgres
    environment:
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - triton-net

  redis:
    image: redis:7-alpine
    container_name: triton-redis
    ports:
      - "6379:6379"
    networks:
      - triton-net

  auth-service:
    build: ./services/auth-service
    container_name: triton-auth
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: db_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: triton_session_super_secret_2024_change_this
      SESSION_MAX_AGE_MS: 28800000
      USER_SERVICE_URL: http://user-service:4002
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - redis
    networks:
      - triton-net

  user-service:
    build: ./services/user-service
    container_name: triton-user
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: db_user
      PORT: 4002
    ports:
      - "4002:4002"
    depends_on:
      - postgres
    networks:
      - triton-net

  sd-service:
    build: ./services/sd-service
    container_name: triton-sd
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: db_sd
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:4002
      PORT: 4005
    ports:
      - "4005:4005"
    depends_on:
      - postgres
    networks:
      - triton-net

  smp-service:
    build: ./services/smp-service
    container_name: triton-smp
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: db_smp
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:4002
      PORT: 4006
    ports:
      - "4006:4006"
    depends_on:
      - postgres
    networks:
      - triton-net

  sma-service:
    build: ./services/sma-service
    container_name: triton-sma
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: triton_user
      POSTGRES_PASSWORD: triton_secret_2024
      POSTGRES_DB: db_sma
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:4002
      PORT: 4007
    ports:
      - "4007:4007"
    depends_on:
      - postgres
    networks:
      - triton-net

  api-gateway:
    build: ./services/api-gateway
    container_name: triton-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      SD_SERVICE_URL: http://sd-service:4005
      SMP_SERVICE_URL: http://smp-service:4006
      SMA_SERVICE_URL: http://sma-service:4007
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - user-service
      - sd-service
      - smp-service
      - sma-service
    networks:
      - triton-net

networks:
  triton-net:
    driver: bridge

volumes:
  postgres_data:
